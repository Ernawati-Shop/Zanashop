<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZanaShop - Promo Spesial</title>
    <style>
        /* =========================================
           RESET & BASE STYLES
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f2f5 0%, #dfe9f3 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
            line-height: 1.5;
        }

        /* =========================================
           CONTAINER
           ========================================= */
        .container {
            background: #ffffff;
            padding: 25px 15px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            overflow: hidden;
        }

        /* =========================================
           HEADER
           ========================================= */
        .header {
            margin-bottom: 25px;
        }

        .logo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #25D366;
        }

        h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        /* =========================================
           PROMO SECTION
           ========================================= */
        .promo-section {
            margin-bottom: 25px;
        }

        .promo-title {
            font-size: 18px;
            color: #e53935;
            font-weight: 800;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px dotted #eee;
            display: inline-block;
        }

        /* =========================================
           GALLERY - VERTIKAL (SATU-SATU KE BAWAH)
           ========================================= */
        .gallery {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 5px;
            align-items: center;
        }

        .gallery-item {
            width: 100%;
            max-width: 100%;
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            background-color: #f5f5f5;
        }

        .gallery-item img:hover {
            transform: scale(1.02);
        }

        /* =========================================
           WHATSAPP BUTTON
           ========================================= */
        .wa-btn {
            background: linear-gradient(90deg, #25D366 0%, #20BD5A 100%);
            color: white;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.35);
            transition: all 0.2s;
            margin-top: 15px;
        }

        .wa-btn:hover {
            background: linear-gradient(90deg, #20BD5A 0%, #1DA150 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.5);
            color: white;
            text-decoration: none;
        }

        /* =========================================
           FOOTER
           ========================================= */
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <img src="https://tse1.mm.bing.net/th/id/OIP.YWBVNiA_wWIW7AK9SNYlhQHaHa?pid=ImgDet&w=203&h=203&c=7&o=7&rm=3" alt="Logo" class="logo">
            <h1>ZanaShop</h1>
            <p class="subtitle">Pusat Belanja Aneka Obat & Kesehatan Keluarga</p>
        </div>

        <!-- Galeri Promo -->
        <div class="promo-section">
            <div class="promo-title">🔥 Produk Unggulan 🔥</div>
            
            <div class="gallery">
                <!-- Gambar 1 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/PvBHX3Tz/Screenshot-2026-06-06-103221.png" alt="Produk 1">
                </div>
                
                <!-- Gambar 2 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/MxmT0DWd/Screenshot-2026-06-06-103227.png" alt="Produk 2">
                </div>
                
                <!-- Gambar 3 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/NdLBXLKL/Screenshot-2026-06-06-103232.png" alt="Produk 3">
                </div>
                
                <!-- Gambar 4 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/qL0g7zXB/Screenshot-2026-06-06-103131.png" alt="Produk 4">
                </div>
                
                <!-- Gambar 5 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/Q7SdqBkH/Screenshot-2026-06-06-103146.png" alt="Produk 5">
                </div>
                
                <!-- Gambar 6 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/zhFpbtGW/Screenshot-2026-06-06-103203.png" alt="Produk 6">
                </div>
                
                <!-- Gambar 7 -->
                <div class="gallery-item">
                    <img src="https://i.ibb.co.com/jvqNsPrp/Screenshot-2026-06-06-103237.png" alt="Produk 7">
                </div>
            </div>
        </div>

        <!-- Tombol WhatsApp -->
        <a href="#" onclick="chatWA(); return false;" class="wa-btn">
            💬 Beli via WhatsApp
        </a>

        <div class="footer">
            © 2026 ZanaShop - Ernawati, S.Pd, M.M, M.Si
        </div>
    </div>

    <script>
        // =========================================
        // FUNGSI CHAT WHATSAPP
        // =========================================
        function chatWA() {
            // --- KONFIGURASI ---
            // GANTI nomor di bawah ini dengan nomor WA Anda (format: 628xxx tanpa 0)
            var nomorWA = "6285376168457";
            
            // Pesan otomatis yang akan dikirim
            var pesan = "Halo kak ZanaShop, saya tertarik dengan produk promo. Apakah stock masih ada?";
            
            // Build URL WhatsApp
            var urlWA = "https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesan);
            
            // Buka WhatsApp di tab baru
            window.open(urlWA, '_blank');
        }
    </script>

</body>
</html>
