<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online Kami - Promo Spesial</title>
    <style>
        /* Reset Dasar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px 10px;
        }

        /* Container Utama */
        .container {
            background: white;
            padding: 30px 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        /* Header Section */
        .header {
            margin-bottom: 30px;
        }

        .logo-halal {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
        }

        .logo-kustom {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
        p.subtitle { font-size: 14px; color: #666; margin-bottom: 25px; }

        /* Bagian 7 Gambar Promo - RESPONSIF */
        .promo-section {
            margin-bottom: 30px;
        }

        .promo-title {
            font-size: 18px;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 kolom di HP */
            gap: 10px;
            max-width: 100%;
            margin: 0 auto;
        }

        /* Responsive untuk layar lebar (Laptop/Tablet) */
        @media (min-width: 500px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr); /* 3 kolom di layar sedang */
                gap: 15px;
            }
        }

        @media (min-width: 700px) {
            .gallery {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        .gallery img {
            width: 100%;          /* Mengisi lebar kotak */
            height: 150px;        /* Tinggi tetap agar rapi */
            object-fit: cover;    /* Gambar tidak gepet */
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.03); /* Efek zoom saat disentuh */
        }

        /* Tombol WhatsApp */
        .wa-button {
            background-color: #25D366;
            color: white;
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.3s;
            margin-top: 10px;
        }

        .wa-button:hover {
            background-color: #20bd5a;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6);
        }

        .wa-button:active {
            transform: translateY(0);
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header dengan Logo -->
        <div class="header">
            <img src="nnnnn" alt="Logo Halal" class="logo-halal">
           
            <h1>Selamat Datang di Toko Kami</h1>
            <p class="subtitle">Pusat Belanja Aneka Obat & Kebutuhan kesehatan Keluarga</p>
        </div>

        <!-- Bagian 7 Gambar Promo -->
        <div class="promo-section">
            <div class="promo-title">🔥Produk Unggulan kami🔥</div>
            
            <div class="gallery">
                <!-- GANTI link="..." di bawah ini dengan 7 URL gambar produk kamu -->
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/PvBHX3Tz/Screenshot-2026-06-06-103221.png" alt="Produk 1">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/MxmT0DWd/Screenshot-2026-06-06-103227.png" alt="Produk 2">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/NdLBXLKL/Screenshot-2026-06-06-103232.png" alt="Produk 3">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/qL0g7zXB/Screenshot-2026-06-06-103131.png" alt="Produk 4">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/Q7SdqBkH/Screenshot-2026-06-06-103146.png" alt="Produk 5">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/zhFpbtGW/Screenshot-2026-06-06-103203.png" alt="Produk 6">
                <img src="https://imgbb.com/"><img src="https://i.ibb.co.com/jvqNsPrp/Screenshot-2026-06-06-103237.png" alt="Produk 7">
            </div>
        </div>

        <!-- Tombol WhatsApp (Ditempatkan di bawah promo) -->
        <button onclick="chatWhatsApp()" class="wa-button">
            💬 Beli Sekarang via WhatsApp
        </button>

        <div class="footer">
            © 2026 ZanaShop - Ernawati ,S.Pd,M.M,M.Si
        </div>
    </div>

    <script>
        function chatWhatsApp() {
            // Nomor WhatsApp Tujuan (085376168457)
            var nomorWA = "6285376168457";
            
            // Pesan Otomatis
            var pesan = "Halo kak, saya tertarik dengan produk yang ada di promo. Mau tanya ketersediaan dan harga terbaru dong.";
            
            // Format URL WhatsApp
            var urlWA = "https://wa.me/" + nomorWA + "?text=" + encodeURIComponent(pesan);
            
            // Buka WhatsApp
            window.open(urlWA, '_blank');
        }
    </script>

</body>
</html>
